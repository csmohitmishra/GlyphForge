<!DOCTYPE html>
<html>


<head>
    <title>Contact - GlyphForge</title>

    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff2d6f'/%3E%3Ctext x='50' y='58' font-size='48' text-anchor='middle' fill='white' font-family='Arial'%3EG%3C/text%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ---------------- PARTICLE BACKGROUND ---------------- */

        /* Moving glow blobs */
        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -1;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.5;
        }

        /* Cyan glow */
        body::before {
            background: radial-gradient(circle at 20% 30%, #00ffd5 0%, transparent 20%),
                radial-gradient(circle at 70% 60%, #00eaff 0%, transparent 20%);
            animation: float1 12s linear infinite;
        }

        /* Pink glow */
        body::after {
            background: radial-gradient(circle at 80% 20%, #ff2d6f 0%, transparent 20%),
                radial-gradient(circle at 30% 80%, #ff6a9f 0%, transparent 20%);
            animation: float2 14s linear infinite;
        }

        /* subtle grid particles */
        html::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image:
                radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 35px 35px;
            opacity: 0.2;
        }

        /* animations */
        @keyframes float1 {
            0% {
                transform: translateY(0px) translateX(0px);
            }

            50% {
                transform: translateY(-40px) translateX(30px);
            }

            100% {
                transform: translateY(0px) translateX(0px);
            }
        }

        @keyframes float2 {
            0% {
                transform: translateY(0px) translateX(0px);
            }

            50% {
                transform: translateY(40px) translateX(-30px);
            }

            100% {
                transform: translateY(0px) translateX(0px);
            }
        }
    </style>
</head>

<body style="font-family:Arial, sans-serif; background:#111; color:#eee; margin:0; padding:0;">

    <div
        style="max-width:700px; margin:60px auto; background:#1b1b1b; padding:35px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.6);">

        <h1 style="text-align:center; color:#00d9ff;">Contact GlyphForge 📩</h1>

        <p style="text-align:center; color:#ccc;">
            Have a question, suggestion, or feedback about <b>GlyphForge</b>? Send us a message below.
        </p>

        <form id="contactForm" method="post" enctype="text/plain">

            <label style="display:block; margin-top:15px;">Your Name</label>
            <input type="text" name="name" required
                style="width:100%; padding:10px; border-radius:5px; border:none; margin-top:5px;">

            <label style="display:block; margin-top:15px;">Your Email</label>
            <input type="email" name="email" required
                style="width:100%; padding:10px; border-radius:5px; border:none; margin-top:5px;">

            <label style="display:block; margin-top:15px;">Message</label>
            <textarea name="message" rows="5" required
                style="width:100%; padding:10px; border-radius:5px; border:none; margin-top:5px;"></textarea>

            <div style="text-align:center; margin-top:25px;">
                <button type="submit" style="
background: linear-gradient(90deg,#00ffd5,#ff2d6f);
color:#04121c;
padding:12px 28px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,255,213,0.25);
transition:0.2s;">
                    Send Message
                </button>
            </div>

        </form>

        <hr style="margin:30px 0; border-color:#333;">

        <p style="text-align:center; color:#aaa;">
            Or email us directly at
            <a href="mailto:support.glyphforge@gmail.com" style="color:#00d9ff; text-decoration:none;">
                support.glyphforge@gmail.com
            </a>
        </p>



        <div style="text-align:center; margin-top:20px;">
            <a href="index.html" style="text-decoration:none; color:#00d9ff; font-size:14px;">
                ⬅ Back to Home
            </a>
        </div>

    </div>

    <div id="popup"
        style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#00d9ff; color:#000; padding:15px 25px; border-radius:6px; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:1000;">
        <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

        <script>
            (function () {
                emailjs.init("I3af9em96R0xPL0cJ"); // 🔥 paste your public key here
            })();

            const form = document.getElementById('contactForm');

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                const name = this.querySelector('input[type="text"]').value;
                const email = this.querySelector('input[type="email"]').value;
                const message = this.querySelector('textarea').value;

                if (!name || !email || !message) {
                    alert("Please fill all fields!");
                    return;
                }

                emailjs.send("service_oo2f3se", "template_duquhxq", {
                    name: name,
                    email: email,
                    message: message
                })
                    .then(() => {
                        const popup = document.getElementById('popup');
                        popup.innerText = `✅ Thank you ${name}! Message sent successfully.`;
                        popup.style.display = 'block';

                        setTimeout(() => popup.style.display = 'none', 3000);
                        form.reset();
                    })
                    .catch((error) => {
                        alert("❌ Failed to send message. Try again.");
                        console.error(error);
                    });
            });
        </script>


</body>

</html>
